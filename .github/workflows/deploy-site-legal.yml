name: Deploy legal site pages to VPS

on:
  workflow_dispatch:
    inputs:
      payload_ref:
        description: "Git ref containing site-legal-update"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout payload
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.payload_ref }}

      - name: Verify payload
        shell: bash
        run: |
          set -euo pipefail
          root="site-legal-update"
          files=(
            index.html
            features.html
            guide.html
            launcher.html
            leaderboard.html
            map.html
            profile.html
            rules.html
            servers.html
            wipe.html
            shop.html
            cases.html
            farm.html
            legal.html
            offer.html
            privacy.html
            payment-refund.html
            delivery.html
            sitemap.xml
            css/pages/legal.css
          )
          for f in "${files[@]}"; do
            test -f "$root/$f"
          done
          grep -Fq "222412608054" "$root/legal.html"
          grep -Fq "326220200063519" "$root/legal.html"
          grep -Fq "legal-email" "$root/legal.html"
          grep -Fq "doomsday7dtd.online" "$root/legal.html"
          grep -Fq "privacy.html" "$root/legal.html"
          grep -Fq "payment-refund.html" "$root/legal.html"
          grep -Fq "delivery.html" "$root/legal.html"
          grep -Fq "payment-logo mir" "$root/payment-refund.html"
          grep -Fq "VISA" "$root/payment-refund.html"
          grep -Fq "Mastercard" "$root/payment-refund.html"
          grep -Fq "payment-logo sbp" "$root/payment-refund.html"
          grep -Fq "222412608054" "$root/shop.html"
          tar -czf payload.tgz -C "$root" "${files[@]}"

      - name: Deploy files to VPS
        shell: bash
        env:
          VPS_HOST: 193.233.91.196
          VPS_USER: root
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          common=(-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=3)
          mkdir -p ~/.ssh
          remote_tmp="/tmp/doomsday-site-legal-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          use_password=0
          if [ -n "${VPS_SSH_KEY:-}" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/doomsday_vps_key
            chmod 600 ~/.ssh/doomsday_vps_key
            if ssh "${common[@]}" -i ~/.ssh/doomsday_vps_key "$VPS_USER@$VPS_HOST" 'echo key-ok' >/dev/null 2>&1; then
              ssh_cmd=(ssh "${common[@]}" -i ~/.ssh/doomsday_vps_key "$VPS_USER@$VPS_HOST")
              scp_cmd=(scp "${common[@]}" -i ~/.ssh/doomsday_vps_key)
            else
              use_password=1
            fi
          else
            use_password=1
          fi

          if [ "$use_password" -eq 1 ]; then
            if [ -z "${VPS_SSH_PASSWORD:-}" ]; then
              echo "No usable SSH key and no password secret"
              exit 1
            fi
            sudo apt-get update -y >/dev/null
            sudo apt-get install -y sshpass >/dev/null
            ssh_cmd=(sshpass -p "$VPS_SSH_PASSWORD" ssh "${common[@]}" "$VPS_USER@$VPS_HOST")
            scp_cmd=(sshpass -p "$VPS_SSH_PASSWORD" scp "${common[@]}")
          fi

          cat > remote-deploy.sh <<'REMOTE'
          #!/usr/bin/env bash
          set -euo pipefail
          remote_tmp="$1"
          webroot="${2:-/var/www/doomsday}"
          files=(
            index.html
            features.html
            guide.html
            launcher.html
            leaderboard.html
            map.html
            profile.html
            rules.html
            servers.html
            wipe.html
            shop.html
            cases.html
            farm.html
            legal.html
            offer.html
            privacy.html
            payment-refund.html
            delivery.html
            sitemap.xml
            css/pages/legal.css
          )
          test -d "$webroot"
          mkdir -p "$remote_tmp/payload"
          tar -xzf "$remote_tmp/payload.tgz" -C "$remote_tmp/payload"
          for f in "${files[@]}"; do
            test -f "$remote_tmp/payload/$f"
          done
          backup="$webroot/.backup-legal-$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$backup"
          for f in "${files[@]}"; do
            if [ -e "$webroot/$f" ]; then
              mkdir -p "$backup/$(dirname "$f")"
              cp -a "$webroot/$f" "$backup/$f"
            fi
            install -D -m 0644 "$remote_tmp/payload/$f" "$webroot/$f"
          done
          if command -v nginx >/dev/null 2>&1; then
            nginx -t
          fi
          rm -rf "$remote_tmp"
          echo "backup=$backup"
          REMOTE

          "${ssh_cmd[@]}" "mkdir -p '$remote_tmp'"
          "${scp_cmd[@]}" payload.tgz remote-deploy.sh "$VPS_USER@$VPS_HOST:$remote_tmp/"
          "${ssh_cmd[@]}" "bash '$remote_tmp/remote-deploy.sh' '$remote_tmp' /var/www/doomsday"

      - name: Verify public site
        shell: bash
        run: |
          set -euo pipefail
          base="https://doomsday7dtd.online"
          bust="$(date +%s)-$RANDOM"
          check_contains() {
            local url="$1"
            local marker="$2"
            local body
            for _ in 1 2 3 4 5; do
              if body="$(curl --retry 2 --retry-all-errors --retry-delay 3 -fsSL "$url")" && grep -Fq "$marker" <<<"$body"; then
                echo "ok $url"
                return 0
              fi
              sleep 5
            done
            echo "::warning::Could not verify $url from GitHub runner"
            return 0
          }
          check_contains "$base/legal.html?bust=$bust" "222412608054"
          check_contains "$base/offer.html?bust=$bust" "326220200063519"
          check_contains "$base/privacy.html?bust=$bust" "222412608054"
          check_contains "$base/payment-refund.html?bust=$bust" "payment-logo mir"
          check_contains "$base/delivery.html?bust=$bust" "326220200063519"
          check_contains "$base/shop.html?bust=$bust" "222412608054"
          check_contains "$base/cases.html?bust=$bust" "222412608054"
          check_contains "$base/farm.html?bust=$bust" "222412608054"
